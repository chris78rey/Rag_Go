services:
  server:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-openai/text-embedding-3-large}
      - JWT_SECRET=${JWT_SECRET}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=raguser
      - DB_PASSWORD=ragpass
      - DB_NAME=ragdb
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6334
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-semantic_docs}
      - CHUNK_SIZE=${CHUNK_SIZE:-512}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-64}
      - TOP_K=${TOP_K:-10}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - UPLOAD_DIR=/app/uploads
    volumes:
      - uploads:/app/uploads
    networks:
      - coolify
      - internal
    expose:
      - "8080"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.${CLIENT_ID}-rag.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.${CLIENT_ID}-rag.entrypoints=https"
      - "traefik.http.routers.${CLIENT_ID}-rag.tls=true"
      - "traefik.http.routers.${CLIENT_ID}-rag.tls.certresolver=letsencrypt"
      - "traefik.http.services.${CLIENT_ID}-rag.loadbalancer.server.port=8080"
      - "traefik.http.routers.${CLIENT_ID}-rag-http.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.${CLIENT_ID}-rag-http.entrypoints=http"
      - "traefik.http.routers.${CLIENT_ID}-rag-http.middlewares=${CLIENT_ID}-redirect"
      - "traefik.http.middlewares.${CLIENT_ID}-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.${CLIENT_ID}-redirect.redirectscheme.permanent=true"
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.9.0
    volumes:
      - qdrant_v2:/qdrant/storage
    networks:
      - internal
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ragpass
      POSTGRES_DB: ragdb
    volumes:
      - pgdata_v2:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raguser"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

volumes:
  qdrant_v2:
  pgdata_v2:
  uploads:

networks:
  coolify:
    external: true
  internal:
    driver: bridge
