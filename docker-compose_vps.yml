services:
  server:
    build: .
    depends_on:
      qdrant:
        condition: service_started
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:?define_OPENROUTER_API_KEY}
    volumes:
      - uploads:/app/uploads
      - data:/app/data
    networks:
      - coolify
      - internal
    expose:
      - "8080"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.raggo-rag.rule=Host(`rag.da-tica.com`)"
      - "traefik.http.routers.raggo-rag.entrypoints=https"
      - "traefik.http.routers.raggo-rag.tls=true"
      - "traefik.http.routers.raggo-rag.tls.certresolver=letsencrypt"
      - "traefik.http.services.raggo-rag.loadbalancer.server.port=8080"
      - "traefik.http.routers.raggo-rag-http.rule=Host(`rag.da-tica.com`)"
      - "traefik.http.routers.raggo-rag-http.entrypoints=http"
      - "traefik.http.routers.raggo-rag-http.middlewares=raggo-redirect"
      - "traefik.http.middlewares.raggo-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.raggo-redirect.redirectscheme.permanent=true"
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.9.0
    volumes:
      - qdrant_v3:/qdrant/storage
    networks:
      - internal
    restart: unless-stopped

volumes:
  qdrant_v3:
  uploads:
  data:

networks:
  coolify:
    external: true
  internal:
    driver: bridge
